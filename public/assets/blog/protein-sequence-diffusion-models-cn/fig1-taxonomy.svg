<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Protein sequence diffusion model taxonomy</title>
  <desc id="desc">A four-lane taxonomy of diffusion models for protein sequences: discrete sequence diffusion, latent representation diffusion, multimodal sequence-structure diffusion, and evolutionary edit diffusion.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8f4; }
      .ink { fill: #1f2933; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #5e6872; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font-size: 23px; }
      .body { font-size: 27px; }
      .title { font-size: 44px; font-weight: 750; }
      .lane-title { font-size: 31px; font-weight: 720; }
      .card { rx: 20; ry: 20; stroke-width: 3; }
      .blue { fill: #e6f0f6; stroke: #4b84a6; }
      .green { fill: #e8f2e7; stroke: #5f9360; }
      .amber { fill: #fbefd9; stroke: #c08a2d; }
      .violet { fill: #eee9f7; stroke: #8467a8; }
      .line { stroke: #7b8794; stroke-width: 3; fill: none; stroke-linecap: round; }
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="5.5" orient="auto">
      <path d="M0,0 L11,5.5 L0,11 Z" fill="#7b8794" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="720" />
  <text class="ink title" x="80" y="82">蛋白质序列扩散模型的四条主线</text>
  <text class="muted body" x="80" y="126">同一个 diffusion 思想，落在不同数据空间，就变成不同的建模路线。</text>

  <rect class="card blue" x="80" y="180" width="520" height="175" />
  <text class="ink lane-title" x="116" y="228">1. 离散序列 diffusion</text>
  <text class="muted small" x="116" y="270">数据空间：amino-acid token / MSA token</text>
  <text class="muted small" x="116" y="306">代表：EvoDiff, DPLM, DSM, MeMDLM</text>
  <text class="muted small" x="116" y="342">优势：motif 固定、infilling、并行去噪</text>

  <rect class="card green" x="680" y="180" width="520" height="175" />
  <text class="ink lane-title" x="716" y="228">2. PLM latent diffusion</text>
  <text class="muted small" x="716" y="270">数据空间：ESM / ESMc / SaProt embedding</text>
  <text class="muted small" x="716" y="306">代表：DiMA, PRO-LDM, AMP-Diffusion</text>
  <text class="muted small" x="716" y="342">优势：连续、可微、易接属性条件</text>

  <rect class="card amber" x="80" y="420" width="520" height="175" />
  <text class="ink lane-title" x="116" y="468">3. 序列-结构多模态 diffusion</text>
  <text class="muted small" x="116" y="510">数据空间：sequence token + structure token/latent</text>
  <text class="muted small" x="116" y="546">代表：DPLM-2, HD-Prot, ProtLiD², PLAID</text>
  <text class="muted small" x="116" y="582">目标：序列与结构同时相容</text>

  <rect class="card violet" x="680" y="420" width="520" height="175" />
  <text class="ink lane-title" x="716" y="468">4. 进化编辑 diffusion</text>
  <text class="muted small" x="716" y="510">数据空间：可变长序列编辑轨迹</text>
  <text class="muted small" x="716" y="546">代表：DPLM-Evo</text>
  <text class="muted small" x="716" y="582">动作：substitution / insertion / deletion</text>

  <path class="line" d="M600 267 C635 267 645 267 680 267" marker-end="url(#arrow)" />
  <path class="line" d="M600 507 C635 507 645 507 680 507" marker-end="url(#arrow)" />
  <path class="line" d="M340 355 C340 382 340 393 340 420" marker-end="url(#arrow)" />
  <path class="line" d="M940 355 C940 382 940 393 940 420" marker-end="url(#arrow)" />
</svg>
