<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Absorbing masked diffusion for protein sequences</title>
  <desc id="desc">A diagram showing amino acid tokens gradually replaced by mask tokens in the forward process and recovered in parallel by a denoising protein language model in the reverse process.</desc>
  <defs>
    <style>
      .bg { fill: #f8faf8; }
      .ink { fill: #1e2a32; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #62727d; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 42px; font-weight: 760; }
      .label { font-size: 28px; font-weight: 700; }
      .body { font-size: 24px; }
      .token { fill: #e7f0f5; stroke: #477e9f; stroke-width: 2.5; rx: 14; ry: 14; }
      .mask { fill: #f1e9f7; stroke: #7f62a2; stroke-width: 2.5; rx: 14; ry: 14; }
      .fixed { fill: #e9f3e7; stroke: #5f955e; stroke-width: 2.5; rx: 14; ry: 14; }
      .arrow { stroke: #7b8794; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M0,0 L13,6.5 L0,13 Z" fill="#7b8794" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="720" />
  <text class="ink title" x="74" y="80">离散 absorbing diffusion：从序列到 mask，再从 mask 回到序列</text>
  <text class="muted body" x="74" y="124">DPLM / DSM / MeMDLM 的核心对象是 categorical token；时间步控制 mask 比例。</text>

  <text class="ink label" x="88" y="205">forward noising</text>
  <text class="muted body" x="88" y="240">保留一部分氨基酸，把其余位置吸收到 [MASK]</text>
  <path class="arrow" d="M340 230 C440 230 455 230 555 230" />
  <path class="arrow" d="M720 230 C820 230 835 230 935 230" />

  <g transform="translate(80 285)">
    <rect class="token" x="0" y="0" width="72" height="60" /><text class="ink label" x="24" y="39">M</text>
    <rect class="token" x="86" y="0" width="72" height="60" /><text class="ink label" x="111" y="39">K</text>
    <rect class="token" x="172" y="0" width="72" height="60" /><text class="ink label" x="198" y="39">L</text>
    <rect class="token" x="258" y="0" width="72" height="60" /><text class="ink label" x="282" y="39">V</text>
    <rect class="token" x="344" y="0" width="72" height="60" /><text class="ink label" x="369" y="39">A</text>
    <text class="muted body" x="42" y="96">x₀：真实蛋白序列</text>
  </g>

  <g transform="translate(470 285)">
    <rect class="fixed" x="0" y="0" width="72" height="60" /><text class="ink label" x="24" y="39">M</text>
    <rect class="mask" x="86" y="0" width="72" height="60" /><text class="ink label" x="94" y="39">X</text>
    <rect class="fixed" x="172" y="0" width="72" height="60" /><text class="ink label" x="198" y="39">L</text>
    <rect class="mask" x="258" y="0" width="72" height="60" /><text class="ink label" x="266" y="39">X</text>
    <rect class="mask" x="344" y="0" width="72" height="60" /><text class="ink label" x="352" y="39">X</text>
    <text class="muted body" x="38" y="96">xₜ：部分 token 被 mask</text>
  </g>

  <g transform="translate(860 285)">
    <rect class="mask" x="0" y="0" width="72" height="60" /><text class="ink label" x="8" y="39">X</text>
    <rect class="mask" x="86" y="0" width="72" height="60" /><text class="ink label" x="94" y="39">X</text>
    <rect class="mask" x="172" y="0" width="72" height="60" /><text class="ink label" x="180" y="39">X</text>
    <rect class="mask" x="258" y="0" width="72" height="60" /><text class="ink label" x="266" y="39">X</text>
    <rect class="mask" x="344" y="0" width="72" height="60" /><text class="ink label" x="352" y="39">X</text>
    <text class="muted body" x="38" y="96">x_T：全 mask 先验</text>
  </g>

  <path class="arrow" d="M1000 440 C900 520 790 550 650 550 C510 550 392 520 250 440" />
  <text class="ink label" x="530" y="615">reverse denoising</text>
  <text class="muted body" x="404" y="652">Transformer 并行预测被 mask 的残基；置信度低的位置可继续 remask。</text>
</svg>
