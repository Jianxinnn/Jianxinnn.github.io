<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Multimodal protein diffusion language model</title>
  <desc id="desc">A diagram of a multimodal diffusion protein language model that jointly denoises amino acid tokens and structure tokens while accepting functional or ligand conditions.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8f4; }
      .ink { fill: #1f2933; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #64707a; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { font-size: 42px; font-weight: 760; }
      .h { font-size: 30px; font-weight: 720; }
      .b { font-size: 24px; }
      .box { stroke-width: 3; rx: 20; ry: 20; }
      .seq { fill: #e7f0f5; stroke: #477e9f; }
      .str { fill: #fbefd9; stroke: #c08a2d; }
      .cond { fill: #e8f2e7; stroke: #5f9360; }
      .model { fill: #eee9f7; stroke: #8467a8; }
      .arrow { stroke: #7b8794; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
      <path d="M0,0 L13,6.5 L0,13 Z" fill="#7b8794" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="720" />
  <text class="ink title" x="78" y="82">多模态 diffusion PLM：同一个去噪器处理序列与结构</text>
  <text class="muted b" x="78" y="126">DPLM-2 把结构离散成 token；HD-Prot 改用连续结构 token；ProtLiD² 再加入 ligand 条件。</text>

  <rect class="box seq" x="86" y="210" width="285" height="140" />
  <text class="ink h" x="126" y="266">sequence tokens</text>
  <text class="muted b" x="126" y="306">A, R, N, D, C ...</text>

  <rect class="box str" x="86" y="410" width="285" height="140" />
  <text class="ink h" x="126" y="466">structure tokens</text>
  <text class="muted b" x="126" y="506">LFQ / 3Di / latent</text>

  <path class="arrow" d="M371 280 L508 340" />
  <path class="arrow" d="M371 480 L508 420" />

  <rect class="box model" x="508" y="250" width="300" height="260" />
  <text class="ink h" x="566" y="316">diffusion PLM</text>
  <text class="muted b" x="552" y="360">shared context</text>
  <text class="muted b" x="552" y="396">cross-modal attention</text>
  <text class="muted b" x="552" y="432">iterative denoising</text>
  <text class="muted b" x="552" y="468">remask / guidance</text>

  <rect class="box cond" x="475" y="575" width="365" height="90" />
  <text class="ink h" x="520" y="630">function / motif / ligand condition</text>
  <path class="arrow" d="M657 575 L657 510" />

  <path class="arrow" d="M808 340 L954 280" />
  <path class="arrow" d="M808 420 L954 480" />

  <rect class="box seq" x="954" y="210" width="240" height="140" />
  <text class="ink h" x="999" y="266">sequence</text>
  <text class="muted b" x="995" y="306">designable</text>

  <rect class="box str" x="954" y="410" width="240" height="140" />
  <text class="ink h" x="1000" y="466">structure</text>
  <text class="muted b" x="995" y="506">compatible</text>
</svg>
